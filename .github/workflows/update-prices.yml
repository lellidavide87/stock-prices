name: Update stock prices

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 7-21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch prices
        run: python fetch_prices.py
      - name: Commit prices.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: update prices
          file_pattern: prices.json
