name: Update stock prices

on:
  workflow_dispatch:
  schedule:
    - cron: "7 7-21 * * 1-5"   # hourly trigger (reliable) - job loops internally every ~6 min

permissions:
  contents: write
  actions: write   # needed by the keepalive step

concurrency:
  group: update-prices
  cancel-in-progress: true     # a fresh hourly run supersedes a stale one

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Keepalive - prevent GitHub 60-day auto-pause
        run: gh api -X PUT repos/${{ github.repository }}/actions/workflows/update-prices.yml/enable
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
      - name: Fetch & commit loop (every ~6 min for the hour)
        shell: bash
        run: |
          set +e
          git config user.name  "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          for i in 1 2 3 4 5 6 7 8 9; do
            echo "=== iteration $i $(date -u) ==="
            python fetch_prices.py || { echo "fetch failed, retry next loop"; sleep 150; continue; }
            git add prices.json
            git commit -m "update prices" >/dev/null 2>&1 || echo "no changes"
            for a in 1 2 3 4; do
              git fetch origin main -q
              git rebase origin/main -q || { git rebase --abort; git reset --soft origin/main; git add prices.json; git commit -m "update prices" >/dev/null 2>&1; }
              git push origin HEAD:main -q && break
              echo "push race, retry $a"; sleep $((RANDOM % 5 + 2))
            done
            [ $i -lt 9 ] && sleep 150
          done
          exit 0
