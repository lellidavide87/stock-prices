name: Update stock prices

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 7-21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch prices
        run: python fetch_prices.py
      - name: Commit prices.json
        shell: bash
        run: |
          set +e
          git config user.name  "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add prices.json
          git commit -m "update prices" || { echo "no changes"; exit 0; }
          for i in 1 2 3 4 5 6; do
            git fetch origin main
            git rebase origin/main
            if [ $? -ne 0 ]; then
              # both runs edited prices.json -> keep OUR version on top of remote
              git rebase --abort
              git reset --soft origin/main
              git add prices.json
              git commit -m "update prices"
            fi
            if git push origin HEAD:main; then
              echo "pushed successfully"
              exit 0
            fi
            echo "push race, retry $i"
            sleep $((RANDOM % 6 + 3))
          done
          echo "could not push this run; next run will catch up"
          exit 0
