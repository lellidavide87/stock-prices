name: Update stock prices

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 7-21 * * 1-5"   # every 5 min, ~market hours (UTC), Mon-Fri

permissions:
  contents: write

concurrency:                  # never let two runs overlap (prevents push conflicts)
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch prices
        run: python fetch_prices.py
      - name: Commit prices.json
        run: |
          git config user.name  "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add prices.json
          git commit -m "update prices" || { echo "no changes"; exit 0; }
          git pull --rebase --autostash origin main
          git push
