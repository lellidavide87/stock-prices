name: Update stock prices

on:
  workflow_dispatch:           # lets you run it by hand any time
  schedule:
    - cron: "*/10 7-21 * * 1-5" # every 10 min, 07:00-21:00 UTC, Mon-Fri (EU open -> US close)

permissions:
  contents: write
  actions: write               # needed so the keep-alive step can re-arm the schedule

concurrency:
  group: update-prices
  cancel-in-progress: false    # queue runs instead of clashing -> no push races

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Commit prices.json (with retry)
        shell: bash
        run: |
          set +e
          git config user.name  "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add prices.json
          git commit -m "update prices" || { echo "no changes"; exit 0; }
          for i in 1 2 3 4 5 6; do
            git fetch origin main
            git rebase origin/main
            if [ $? -ne 0 ]; then
              git rebase --abort
              git reset --soft origin/main
              git add prices.json
              git commit -m "update prices"
            fi
            if git push origin HEAD:main; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push race, retry $i"; sleep $((RANDOM % 6 + 3))
          done
          echo "could not push this run; next run will catch up"; exit 0

      # Stops GitHub from auto-disabling the schedule after 60 days of
      # bot-only activity. Runs every time; only acts when the repo is
      # close to the 60-day inactivity limit.
      - name: Keep workflow alive (stop the 60-day auto-pause)
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true
